version: '3.1'

services:
    redis:
        image: redis:alpine
        container_name: voxscribe-redis
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - voxscribe-net

    voxscribe:
        container_name: voxscribe-main
        build:
            context: .. # Build using the Dockerfile in the root directory
            dockerfile: docker/Dockerfile
        ports:
            - '${PORT}:${PORT}'
        volumes:
            # Mount local .voxscribe to container's default location
            - ../.voxscribe:/root/.voxscribe
        environment:
            # --- Essential VoxScribe Vars ---
            - PORT=${PORT:-3000}
            - DATABASE_PATH=/root/.voxscribe
            - SECRETKEY_PATH=/root/.voxscribe
            - LOG_PATH=/root/.voxscribe/logs
            - BLOB_STORAGE_PATH=/root/.voxscribe/storage
            # --- Queue Vars (Main Instance) ---
            - MODE=queue
            - QUEUE_NAME=voxscribe-queue # Ensure this matches worker
            - REDIS_URL=redis://redis:6379 # Use service name 'redis'
        depends_on:
            - redis
        networks:
            - voxscribe-net

    voxscribe-worker:
        container_name: voxscribe-worker
        build:
            context: .. # Build context is still the root
            dockerfile: docker/worker/Dockerfile # Ensure this path is correct
        volumes:
            # Mount same local .voxscribe to worker
            - ../.voxscribe:/root/.voxscribe
        environment:
            # --- Essential VoxScribe Vars ---
            - WORKER_PORT=${WORKER_PORT:-5566} # Port for worker healthcheck
            - DATABASE_PATH=/root/.voxscribe
            - SECRETKEY_PATH=/root/.voxscribe
            - LOG_PATH=/root/.voxscribe/logs
            - BLOB_STORAGE_PATH=/root/.voxscribe/storage
            # --- Queue Vars (Main Instance) ---
            - MODE=queue
            - QUEUE_NAME=voxscribe-queue # Ensure this matches worker
            - REDIS_URL=redis://redis:6379 # Use service name 'redis'
        depends_on:
            - redis
            - voxscribe
        networks:
            - voxscribe-net

volumes:
    redis_data:
        driver: local

networks:
    voxscribe-net:
        driver: bridge
